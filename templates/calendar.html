<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь - OpenDoor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar.css') }}">
</head>
<body>
    <div class="navbar">
        <h1>OpenDoor</h1>
        <div>
            <span>Пользователь: <strong>{{ username }}</strong></span>
            <a href="{{ url_for('live') }}">Стрим с камеры</a>
            <a href="{{ url_for('logout') }}">Выход</a>
        </div>
    </div>
    
    <div class="container container--narrow">
        <div class="calendar-header">
            <h2>Календарь открытий двери</h2>
            <div class="nav-buttons">
                <a href="?year={{ year }}&month={% if month > 1 %}{{ month - 1 }}{% else %}12{% endif %}{% if month == 1 %}&year={{ year - 1 }}{% endif %}">← Пред</a>
                <span>{{ year }}-{{ "%02d"|format(month) }}</span>
                <a href="?year={{ year }}&month={% if month < 12 %}{{ month + 1 }}{% else %}1{% endif %}{% if month == 12 %}&year={{ year + 1 }}{% endif %}">След →</a>
            </div>
        </div>
        
        <table class="calendar-table">
            <thead>
                <tr>
                    <th>Пн</th>
                    <th>Вт</th>
                    <th>Ср</th>
                    <th>Чт</th>
                    <th>Пт</th>
                    <th>Сб</th>
                    <th>Вс</th>
                </tr>
            </thead>
            <tbody>
                <script>
                    const year = {{ year }};
                    const month = {{ month }};
                    const calendarData = {{ calendar_data | tojson }};
                    
                    const firstDay = new Date(year, month - 1, 1).getDay();
                    const daysInMonth = new Date(year, month, 0).getDate();
                    const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1;
                    
                    let table = '';
                    let dayCounter = 1;
                    
                    // Пустые клетки
                    for (let i = 0; i < adjustedFirstDay; i++) {
                        table += '<td class="empty"></td>';
                    }
                    
                    // Дни месяца
                    for (let i = 0; i < 6; i++) {
                        table += '<tr>';
                        for (let j = 0; j < 7; j++) {
                            if (dayCounter <= daysInMonth) {
                                const dayStr = String(dayCounter).padStart(2, '0');
                                const hasEvents = calendarData.hasOwnProperty(dayStr);
                                const eventCount = hasEvents ? calendarData[dayStr] : 0;
                                
                                if (hasEvents) {
                                    table += `<td onclick="goToDay(${year}, ${month}, ${dayCounter})">`;
                                    table += `<div class="day-cell has-events">${dayCounter}</div>`;
                                    table += `<div class="event-count">`;
                                    table += `<span class="event-indicator"></span>${eventCount} откр.`;
                                    table += `</div></td>`;
                                } else {
                                    table += `<td><div class="day-cell">${dayCounter}</div></td>`;
                                }
                                dayCounter++;
                            } else {
                                table += '<td class="empty"></td>';
                            }
                        }
                        table += '</tr>';
                        if (dayCounter > daysInMonth) break;
                    }
                    
                    document.querySelector('tbody').innerHTML = table;
                    
                    function goToDay(year, month, day) {
                        const dayStr = String(day).padStart(2, '0');
                        const monthStr = String(month).padStart(2, '0');
                        window.location.href = `/day/${year}/${monthStr}/${dayStr}`;
                    }
                </script>
            </tbody>
        </table>
    </div>
</body>
</html>

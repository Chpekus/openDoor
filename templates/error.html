<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .error-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fee;
            border: 2px solid #c33;
            border-radius: 5px;
            text-align: center;
        }
        .error-container h1 {
            color: #c33;
        }
        .error-container a {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>⚠️ Ошибка</h1>
        <p>{{ message }}</p>
        <a href="{{ url_for('index') }}">Вернуться на главную</a>
    </div>
</body>
</html>

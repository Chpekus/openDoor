<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стрим - OpenDoor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/live.css') }}">
</head>
<body>
    <div class="app-layout">
        {% include '_sidebar.html' %}

        <main class="app-main">
    <div class="container">
        <h2>Текущий поток</h2>
        
        <div class="stream-container">
            <div id="loading" class="loading">Загрузка потока...</div>
            <img id="stream-frame" class="stream-frame is-hidden">
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <h3>Кадров на стриме</h3>
                <div class="value" id="stream-frames">0</div>
            </div>
            <div class="stat-box">
                <h3>Обработанных кадров</h3>
                <div class="value" id="processed-frames">0</div>
            </div>
            <div class="stat-box">
                <h3>Серверное время</h3>
                <div class="value" id="server-time">-</div>
            </div>
        </div>
    </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/live.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стрим - OpenDoor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/live.css') }}">
</head>
<body>
    <div class="navbar">
        <h1>OpenDoor</h1>
        <div>
            <span>Пользователь: <strong>{{ username }}</strong></span>
            <a href="{{ url_for('calendar') }}">Календарь</a>
            <a href="{{ url_for('logout') }}">Выход</a>
        </div>
    </div>
    
    <div class="container">
        <h2>Текущий поток</h2>
        
        <div class="stream-container">
            <div id="loading" class="loading">Загрузка потока...</div>
            <img id="stream-frame" class="stream-frame is-hidden">
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <h3>FPS</h3>
                <div class="value" id="fps">0.00</div>
            </div>
            <div class="stat-box">
                <h3>Кадров в окне</h3>
                <div class="value" id="frame-count">0</div>
            </div>
            <div class="stat-box">
                <h3>Обновлено</h3>
                <div class="value" id="last-update">-</div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/live.js') }}"></script>
</body>
</html>
